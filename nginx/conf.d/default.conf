# ─── Upstream Definitions ───
upstream web_upstream {
    server web:3000;
}

upstream api_upstream {
    server api:3001;
}

upstream admin_upstream {
    server admin:3002;
}

upstream pgadmin_upstream {
    server pgadmin:5050;
}

# ─── HTTP → HTTPS Redirect ───
server {
    listen 80;
    server_name rukny.io www.rukny.io api.rukny.io admin.rukny.io db.rukny.io rukny.xyz www.rukny.xyz app.rukny.xyz accounts.rukny.xyz api.rukny.xyz admin.rukny.xyz db.rukny.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Web App: rukny.xyz + app/accounts subdomains (HTTPS) ───
server {
    listen 443 ssl;
    server_name rukny.xyz www.rukny.xyz app.rukny.xyz accounts.rukny.xyz;

    ssl_certificate     /etc/letsencrypt/live/rukny.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rukny.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        limit_req zone=web burst=20 nodelay;
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

