# ============================================
# PRODUCTION Docker Compose
# Deploy on DigitalOcean VPS
# ============================================

services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: rukny_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-rukny_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-rukny_io}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rukny_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rukny_admin} -d ${DB_NAME:-rukny_io}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ───
  redis:
    image: redis:7-alpine
    container_name: rukny_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - rukny_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ───
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rukny_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-rukny_admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-rukny_io}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://rukny.io}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    networks:
      - rukny_network

  # ─── Next.js Web App ───
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - API_BACKEND_URL=http://api:3001
    container_name: rukny_web
    restart: always
    depends_on:
      - api
    environment:
      API_BACKEND_URL: http://api:3001
    networks:
      - rukny_network

  # ─── Next.js Admin App ───
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: rukny_admin
    restart: always
    depends_on:
      - api
    environment:
      API_BACKEND_URL: http://api:3001
    networks:
      - rukny_network

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: rukny_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
      - admin
    networks:
      - rukny_network

  # ─── Certbot (SSL) ───
  certbot:
    image: certbot/certbot
    container_name: rukny_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:

networks:
  rukny_network:
    driver: bridge
